- description: Basic plan start date with secondary benefit dates
  metadata:
    category: baseline
    has_distractor_dates: false
  vars:
    text_blob: "The member's health plan will become active on January 1, 2025. All benefits, including dental and vision, are available from this start date."
    expected_date: "January 1, 2025"
  assert:
    - type: contains
      value: "January 1, 2025"

- description: Main coverage date should win over later dental start date
  metadata:
    category: distractor
    has_distractor_dates: true
  vars:
    text_blob: "Your coverage begins on March 15, 2024, but the premium dental plan benefits do not start until May 1, 2024. The vision plan starts at the same time as the main health coverage."
    expected_date: "March 15, 2024"
  assert:
    - type: contains
      value: "March 15, 2024"

- description: Effective date phrased as benefits start
  metadata:
    category: paraphrase
    has_distractor_dates: false
  vars:
    text_blob: "Benefits are effective starting April 10, 2024. Please note that prescription drug coverage begins immediately upon enrollment."
    expected_date: "April 10, 2024"
  assert:
    - type: contains
      value: "April 10, 2024"

- description: ISO formatted date in policy language
  metadata:
    category: format-variation
    has_distractor_dates: false
  vars:
    text_blob: "The health insurance policy commences on 2024-06-01 and includes comprehensive medical, dental, and vision coverage."
    expected_date: "2024-06-01"
  assert:
    - type: contains
      value: "2024-06-01"

- description: Coverage activation date in full sentence
  metadata:
    category: baseline
    has_distractor_dates: false
  vars:
    text_blob: "Coverage activation date: September 30, 2024. All medical services will be covered from this effective date forward."
    expected_date: "September 30, 2024"
  assert:
    - type: contains
      value: "September 30, 2024"

- description: Ordinal suffix date format
  metadata:
    category: format-variation
    has_distractor_dates: false
  vars:
    text_blob: "Your new health plan goes into effect on December 1st, 2023, providing full access to our network of providers."
    expected_date: "December 1st, 2023"
  assert:
    - type: contains
      value: "December 1st, 2023"

- description: Relative date distractor should still resolve to explicit start date
  metadata:
    category: distractor
    has_distractor_dates: true
  vars:
    text_blob: "Enrollment period ends tomorrow, but your benefits don't start until the first of next month (February 1, 2024)."
    expected_date: "February 1, 2024"
  assert:
    - type: contains
      value: "February 1, 2024"

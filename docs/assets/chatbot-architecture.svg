<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="1020" viewBox="0 0 1600 1020" role="img" aria-labelledby="title desc">
  <title id="title">Health System Chatbot agent architecture</title>
  <desc id="desc">Clean AWS-inspired architecture diagram for the current Health System Chatbot agent. The diagram shows user channels, thin adapters, the workflow.run_chat Text-to-SQL runtime, OpenAI model services, and local data and observability artifacts.</desc>
  <defs>
    <filter id="softShadow" x="-8%" y="-12%" width="116%" height="128%">
      <feDropShadow dx="0" dy="8" stdDeviation="8" flood-color="#1f2937" flood-opacity="0.13"/>
    </filter>
    <marker id="arrowSlate" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth">
      <path d="M2 2 L10 6 L2 10 Z" fill="#4b5563"/>
    </marker>
    <marker id="arrowOrange" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth">
      <path d="M2 2 L10 6 L2 10 Z" fill="#f59e0b"/>
    </marker>
    <marker id="arrowDashed" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth">
      <path d="M2 2 L10 6 L2 10 Z" fill="#64748b"/>
    </marker>
    <style>
      .bg { fill: #f8fafc; }
      .title { font: 700 26px Arial, sans-serif; fill: #0f172a; }
      .subtitle { font: 400 15px Arial, sans-serif; fill: #475569; }
      .section-title { font: 700 18px Arial, sans-serif; fill: #0f172a; }
      .section-note { font: 400 13px Arial, sans-serif; fill: #64748b; }
      .card-title { font: 700 15px Arial, sans-serif; fill: #111827; }
      .card-note { font: 400 12px Arial, sans-serif; fill: #475569; }
      .tiny { font: 400 11px Arial, sans-serif; fill: #64748b; }
      .legend { font: 400 12px Arial, sans-serif; fill: #475569; }
      .panel { fill: #ffffff; stroke: #cbd5e1; stroke-width: 1.5; filter: url(#softShadow); }
      .runtime-panel { fill: #ffffff; stroke: #bfdbfe; stroke-width: 2; filter: url(#softShadow); }
      .data-panel { fill: #ffffff; stroke: #b6c2d2; stroke-width: 1.5; stroke-dasharray: 9 7; }
      .client { fill: #fff7ed; stroke: #f59e0b; stroke-width: 2; }
      .adapter { fill: #eff6ff; stroke: #2563eb; stroke-width: 2; }
      .runtime { fill: #f8fbff; stroke: #2563eb; stroke-width: 2; }
      .context { fill: #f5f3ff; stroke: #7c3aed; stroke-width: 2; }
      .guard { fill: #f0fdf4; stroke: #15803d; stroke-width: 2; }
      .model { fill: #fff7ed; stroke: #f59e0b; stroke-width: 2; }
      .data { fill: #faf5ff; stroke: #7c3aed; stroke-width: 2; }
      .obs { fill: #fff1f2; stroke: #e11d48; stroke-width: 2; }
      .output { fill: #f1f5f9; stroke: #475569; stroke-width: 1.8; }
      .solid { fill: none; stroke: #4b5563; stroke-width: 2.4; marker-end: url(#arrowSlate); }
      .solid-noarrow { fill: none; stroke: #4b5563; stroke-width: 2.4; }
      .model-call { fill: none; stroke: #f59e0b; stroke-width: 2.4; marker-end: url(#arrowOrange); }
      .artifact-link { fill: none; stroke: #64748b; stroke-width: 2.2; stroke-dasharray: 7 7; marker-end: url(#arrowDashed); }
      .badge-text { font: 700 12px Arial, sans-serif; fill: #ffffff; }
      .badge-blue { fill: #2563eb; }
      .badge-purple { fill: #7c3aed; }
      .badge-green { fill: #15803d; }
      .badge-orange { fill: #f59e0b; }
      .badge-slate { fill: #475569; }
      .badge-red { fill: #e11d48; }
    </style>
  </defs>

  <rect class="bg" x="0" y="0" width="1600" height="1020"/>

  <text x="48" y="50" class="title">Health System Chatbot</text>
  <text x="48" y="76" class="subtitle">Arquitetura atual do agente Text-to-SQL sobre o DuckDB local SIH/SUS</text>

  <g aria-label="Legend">
    <line class="solid" x1="1010" y1="54" x2="1068" y2="54"/>
    <text x="1080" y="58" class="legend">fluxo principal</text>
    <line class="model-call" x1="1198" y1="54" x2="1256" y2="54"/>
    <text x="1268" y="58" class="legend">chamadas OpenAI</text>
    <line class="artifact-link" x1="1410" y1="54" x2="1468" y2="54"/>
    <text x="1480" y="58" class="legend">artefatos locais</text>
  </g>

  <rect class="panel" x="48" y="116" width="260" height="354" rx="18"/>
  <text x="72" y="150" class="section-title">Canais de entrada</text>
  <text x="72" y="172" class="section-note">Perguntas e execucoes de dev</text>

  <rect class="client" x="74" y="206" width="208" height="56" rx="10"/>
  <circle class="badge-orange" cx="99" cy="234" r="14"/>
  <text x="95" y="239" class="badge-text">1</text>
  <text x="122" y="229" class="card-title">Interface Web</text>
  <text x="122" y="247" class="card-note">static/index.html</text>

  <rect class="client" x="74" y="296" width="208" height="56" rx="10"/>
  <circle class="badge-orange" cx="99" cy="324" r="14"/>
  <text x="95" y="329" class="badge-text">2</text>
  <text x="122" y="319" class="card-title">CLI</text>
  <text x="122" y="337" class="card-note">ask / ask-file</text>

  <rect class="client" x="74" y="386" width="208" height="56" rx="10"/>
  <circle class="badge-orange" cx="99" cy="414" r="14"/>
  <text x="95" y="419" class="badge-text">3</text>
  <text x="122" y="409" class="card-title">Avaliacao</text>
  <text x="122" y="427" class="card-note">ground truth v2</text>

  <rect class="panel" x="356" y="116" width="260" height="354" rx="18"/>
  <text x="380" y="150" class="section-title">Adaptadores finos</text>
  <text x="380" y="172" class="section-note">Transporte sem regra de negocio</text>

  <rect class="adapter" x="382" y="206" width="208" height="56" rx="10"/>
  <text x="410" y="230" class="card-title">FastAPI app</text>
  <text x="410" y="248" class="card-note">POST /api/chat</text>

  <rect class="adapter" x="382" y="296" width="208" height="56" rx="10"/>
  <text x="410" y="320" class="card-title">CLI parser</text>
  <text x="410" y="338" class="card-note">health_system_chatbot.cli</text>

  <rect class="adapter" x="382" y="386" width="208" height="56" rx="10"/>
  <text x="410" y="410" class="card-title">Evaluation runner</text>
  <text x="410" y="428" class="card-note">metricas, sem ChatbotAnswer</text>

  <rect class="runtime-panel" x="664" y="116" width="520" height="674" rx="18"/>
  <text x="690" y="150" class="section-title">Runtime do agente</text>
  <text x="690" y="172" class="section-note">workflow.run_chat orquestra uma execucao sincronica</text>

  <rect class="runtime" x="704" y="202" width="440" height="58" rx="10"/>
  <circle class="badge-blue" cx="730" cy="231" r="14"/>
  <text x="726" y="236" class="badge-text">1</text>
  <text x="760" y="225" class="card-title">Intent classifier</text>
  <text x="760" y="244" class="card-note">answerable, clarify ou refuse sem SQL insegura</text>

  <rect class="runtime" x="704" y="286" width="440" height="58" rx="10"/>
  <circle class="badge-blue" cx="730" cy="315" r="14"/>
  <text x="726" y="320" class="badge-text">2</text>
  <text x="760" y="309" class="card-title">Schema retrieval</text>
  <text x="760" y="328" class="card-note">Stage 1, policy CSVs e indice LlamaIndex opcional</text>

  <rect class="context" x="704" y="370" width="440" height="58" rx="10"/>
  <circle class="badge-purple" cx="730" cy="399" r="14"/>
  <text x="726" y="404" class="badge-text">3</text>
  <text x="760" y="393" class="card-title">Related context</text>
  <text x="760" y="412" class="card-note">similaridade com perguntas no audit log</text>

  <rect class="model" x="704" y="454" width="440" height="58" rx="10"/>
  <circle class="badge-orange" cx="730" cy="483" r="14"/>
  <text x="726" y="488" class="badge-text">4</text>
  <text x="760" y="477" class="card-title">SQL plan</text>
  <text x="760" y="496" class="card-note">SqlPlan estruturado via LlamaIndex/OpenAI</text>

  <rect class="guard" x="704" y="538" width="440" height="58" rx="10"/>
  <circle class="badge-green" cx="730" cy="567" r="14"/>
  <text x="726" y="572" class="badge-text">5</text>
  <text x="760" y="561" class="card-title">SQL validator</text>
  <text x="760" y="580" class="card-note">SELECT/WITH, tabelas, joins e guards semanticos</text>

  <rect class="guard" x="704" y="622" width="440" height="58" rx="10"/>
  <circle class="badge-green" cx="730" cy="651" r="14"/>
  <text x="726" y="656" class="badge-text">6</text>
  <text x="760" y="645" class="card-title">DuckDB executor</text>
  <text x="760" y="664" class="card-note">SQL validada em modo read-only</text>

  <rect class="runtime" x="704" y="706" width="440" height="58" rx="10"/>
  <circle class="badge-blue" cx="730" cy="735" r="14"/>
  <text x="726" y="740" class="badge-text">7</text>
  <text x="760" y="729" class="card-title">Answer synthesizer</text>
  <text x="760" y="748" class="card-note">answer_pt, caveats, evidence e developer_context</text>

  <rect class="panel" x="1240" y="116" width="312" height="354" rx="18"/>
  <text x="1264" y="150" class="section-title">Servicos de modelo</text>
  <text x="1264" y="172" class="section-note">Dependencias externas configuradas</text>

  <rect class="model" x="1266" y="286" width="246" height="58" rx="10"/>
  <text x="1292" y="310" class="card-title">OpenAI Embeddings</text>
  <text x="1292" y="329" class="card-note">quando indexa schema</text>

  <rect class="model" x="1266" y="454" width="246" height="58" rx="10"/>
  <text x="1292" y="478" class="card-title">OpenAI LLM</text>
  <text x="1292" y="497" class="card-note">gpt-4.1-mini por padrao</text>

  <rect class="output" x="1240" y="586" width="312" height="142" rx="16"/>
  <text x="1264" y="620" class="section-title">Objeto de resposta</text>
  <text x="1264" y="646" class="card-title">ChatbotAnswer</text>
  <text x="1264" y="668" class="card-note">resposta amigavel para usuario</text>
  <text x="1264" y="688" class="card-note">mais SQL opcional e contexto tecnico</text>
  <text x="1264" y="708" class="card-note">status: answered / clarified / refused / failed</text>

  <rect class="data-panel" x="48" y="842" width="1504" height="132" rx="18"/>
  <text x="72" y="876" class="section-title">Plano local de dados e observabilidade</text>
  <text x="72" y="898" class="section-note">Arquivos locais do projeto; banco, indices e traces nao sao tratados como codigo de aplicacao</text>

  <rect class="data" x="86" y="922" width="246" height="38" rx="9"/>
  <text x="108" y="946" class="card-title">Stage 1 artifacts</text>
  <text x="238" y="946" class="tiny">docs/generated</text>

  <rect class="data" x="374" y="922" width="214" height="38" rx="9"/>
  <text x="396" y="946" class="card-title">Vector index</text>
  <text x="496" y="946" class="tiny">.chatbot_index</text>

  <rect class="data" x="630" y="922" width="232" height="38" rx="9"/>
  <text x="652" y="946" class="card-title">SIH/SUS DuckDB</text>
  <text x="790" y="946" class="tiny">read-only</text>

  <rect class="obs" x="904" y="922" width="250" height="38" rx="9"/>
  <text x="926" y="946" class="card-title">Trace + audit log</text>
  <text x="1064" y="946" class="tiny">evaluation/chatbot</text>

  <rect class="obs" x="1196" y="922" width="296" height="38" rx="9"/>
  <text x="1218" y="946" class="card-title">Evaluation results</text>
  <text x="1364" y="946" class="tiny">metrics + errors</text>

  <line class="solid" x1="282" y1="234" x2="382" y2="234"/>
  <line class="solid" x1="282" y1="324" x2="382" y2="324"/>
  <line class="solid" x1="282" y1="414" x2="382" y2="414"/>

  <path class="solid-noarrow" d="M590 234 H634"/>
  <path class="solid-noarrow" d="M590 324 H634"/>
  <path class="solid-noarrow" d="M634 234 V324"/>
  <path class="solid" d="M634 234 H704"/>

  <line class="solid" x1="924" y1="260" x2="924" y2="286"/>
  <line class="solid" x1="924" y1="344" x2="924" y2="370"/>
  <line class="solid" x1="924" y1="428" x2="924" y2="454"/>
  <line class="solid" x1="924" y1="512" x2="924" y2="538"/>
  <line class="solid" x1="924" y1="596" x2="924" y2="622"/>
  <line class="solid" x1="924" y1="680" x2="924" y2="706"/>

  <line class="model-call" x1="1144" y1="315" x2="1266" y2="315"/>
  <line class="model-call" x1="1144" y1="483" x2="1266" y2="483"/>

  <path class="solid" d="M1144 735 H1194 V657 H1240"/>
  <path class="artifact-link" d="M924 764 V842"/>
  <path class="artifact-link" d="M486 442 V782 H1344 V922"/>

  <text x="932" y="810" class="tiny">le artefatos, executa banco e grava observabilidade</text>
  <text x="502" y="802" class="tiny">avaliacao grava metricas e erros</text>
</svg>
